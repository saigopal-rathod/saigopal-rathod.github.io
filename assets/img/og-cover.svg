      <stop offset="0" stop-color="#22e3d6"/>
      <stop offset="1" stop-color="#5b8cff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="85%" cy="15%" r="50%">
      <stop offset="0" stop-color="#22e3d6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22e3d6" stop-opacity="0"/>
